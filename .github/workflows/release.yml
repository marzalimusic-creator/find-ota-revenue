name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install python-semantic-release nuitka

      - run: semantic-release publish
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: python -m nuitka --standalone --onefile --windows-console-mode=disable --enable-plugin=tk-inter --assume-yes-for-downloads --output-dir=. find_ota_revenue.py

      - name: Upload exe to release
        shell: bash
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          gh release upload "$TAG" find_ota_revenue.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
